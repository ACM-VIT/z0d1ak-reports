name: Sign and Notarize macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  macos-release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      APP_NAME: z0d1ak
      BUNDLE_ID: io.z0d1ak
      BUILD_NUMBER: ${{ github.run_number }}
      SIGN_APP: "1"
      NOTARIZE_APP: "1"
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up temporary keychain
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dev_id_app.p12"

          printf '%s' "$MACOS_CERT_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write notary API key
        env:
          APPLE_NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_API_KEY" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_NOTARY_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize
        run: |
          chmod +x ./script/package_release.sh
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            export APP_VERSION="${GITHUB_REF_NAME#v}"
          fi
          ./script/package_release.sh

      - name: Upload notarized app
        uses: actions/upload-artifact@v4
        with:
          name: notarized-macos-app
          path: |
            dist/release/z0d1ak.app
            dist/release/z0d1ak.zip

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/z0d1ak.zip
